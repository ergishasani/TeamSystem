services:

  db:
    image: postgres:16-alpine
    container_name: perka_db
    environment:
      POSTGRES_DB: perka_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d perka_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: perka_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app          # hot-reload: code changes reflect instantly
    env_file:
      - ./backend/.env          # OPENAI_API_KEY etc. — file is gitignored
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/perka_db
      JWT_SECRET_KEY: dev_secret_change_in_production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
      BACKEND_CORS_ORIGINS: "http://localhost:3000,http://localhost:3001,http://localhost:8081,http://localhost:19006"
    depends_on:
      db:
        condition: service_healthy
    # Runs migrations + seed on every start, then launches the server.
    # Seed script is idempotent — safe to run repeatedly.
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed.seed_demo &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
